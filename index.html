<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seize Pages</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #111111;
        --muted: #666666;
        --line: #e6e1d8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
        color: var(--text);
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.1;
      }
      p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.6;
      }
      .links {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }
      a.link {
        display: block;
        text-decoration: none;
        color: var(--text);
        background: #fafafa;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px 18px;
        font-weight: 700;
      }
      a.link span {
        display: block;
        color: var(--muted);
        font-weight: 400;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Seize Pages</h1>
        <p>用于 App Store 公开链接的静态页面站点。这里包含隐私政策和技术支持页面，适合直接发布到 GitHub Pages。</p>
        <p>Static pages for App Store links. This site includes privacy policy and support pages for GitHub Pages hosting.</p>

        <div class="links">
          <a class="link" href="./privacy.html">
            隐私政策 / Privacy Policy
            <span>App Store privacy policy URL</span>
          </a>
          <a class="link" href="./support.html">
            技术支持 / Support
            <span>App Store support URL</span>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
